<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./kamo-wave.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Kamo — Ton compagnon de camouflage numérique." />
    <title>Kamo — Camouflage numérique</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --font: 'Gotham', 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        --kamo-violet:      #6a6af4;
        --kamo-violet-dark: #8585f6;
        --kamo-navy:        #21213f;
        --kamo-blue-light:  #f5f5fe;
        --kamo-blue-act:    #0078f3;
        --kamo-blue-dark:   #0063cb;
        --kamo-red:         #c9191e;
        --kamo-orange:      #fc5d00;
        --kamo-green:       #1f8d49;
        --kamo-green-dark:  #18753c;
        --kamo-teal:        #009099;
        --kamo-purple:      #A558A0;
        --kamo-white:       #ffffff;
        --kamo-bg:          #f5f5fe;
        --kamo-text:        #21213f;
      }
      html, body, #root {
        height: 100%;
        background: var(--kamo-bg);
        color: var(--kamo-text);
        font-family: var(--font);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: var(--kamo-blue-light); }
      ::-webkit-scrollbar-thumb { background: var(--kamo-violet); border-radius: 3px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
